name: ci

on:
  push:
  pull_request:

jobs:
  test-linux:
    name: linux-${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: "12"
            cc: gcc-12
            cxx: g++-12
          - compiler: gcc
            version: "13"
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: "14"
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: "16"
            cc: clang-16
            cxx: clang++-16
          - compiler: clang
            version: "18"
            cc: clang-18
            cxx: clang++-18

    steps:
      - uses: actions/checkout@v4

      - name: Show compiler
        run: |
          ${{ matrix.cc }} --version
          ${{ matrix.cxx }} --version

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build
          -G Ninja
          -DCMAKE_BUILD_TYPE=RelWithDebInfo

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: ctest --test-dir build --output-on-failure

  test-windows-msvc:
    name: windows-msvc
    runs-on: windows-2025

    steps:
      - uses: actions/checkout@v4

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64

      - name: Build
        run: >
          cmake --build build
          --config RelWithDebInfo
          --parallel

      - name: Test
        run: >
          ctest --test-dir build
          -C RelWithDebInfo
          --output-on-failure