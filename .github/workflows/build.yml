name: ci

on:
  push:
  pull_request:

jobs:
  test-linux:
    name: linux-${{ matrix.compiler }}-${{ matrix.version }}
    runs-on: ubuntu-24.04

    strategy:
      fail-fast: false
      matrix:
        include:
          - compiler: gcc
            version: "12"
            cc: gcc-12
            cxx: g++-12
          - compiler: gcc
            version: "13"
            cc: gcc-13
            cxx: g++-13
          - compiler: gcc
            version: "14"
            cc: gcc-14
            cxx: g++-14
          - compiler: clang
            version: "16"
            cc: clang-16
            cxx: clang++-16
          - compiler: clang
            version: "18"
            cc: clang-18
            cxx: clang++-18

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}/.cache/CPM

    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-${{ matrix.compiler }}-${{ matrix.version }}-
            cpm-${{ runner.os }}-${{ matrix.compiler }}-
            cpm-${{ runner.os }}-

      - name: Show compiler
        run: |
          ${{ matrix.cc }} --version
          ${{ matrix.cxx }} --version

      - name: Configure
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}
        run: >
          cmake -S . -B build
          -G Ninja
          -DBUILD_SHARED_LIBS=OFF
          -DCMAKE_BUILD_TYPE=RelWithDebInfo
          -DCPM_SOURCE_CACHE="${{ env.CPM_SOURCE_CACHE }}"

      - name: Build
        run: cmake --build build --parallel

      - name: Test
        run: >
          ctest --test-dir build
          --output-on-failure
          --output-junit ctest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-linux-${{ matrix.compiler }}-${{ matrix.version }}
          path: build/ctest-results.xml
          if-no-files-found: error

  test-windows-msvc:
    name: windows-msvc
    runs-on: windows-2025

    env:
      CPM_SOURCE_CACHE: ${{ github.workspace }}\.cache\CPM

    steps:
      - uses: actions/checkout@v6

      - name: Cache CPM sources
        uses: actions/cache@v5
        with:
          path: ${{ env.CPM_SOURCE_CACHE }}
          key: cpm-${{ runner.os }}-msvc-${{ hashFiles('CMakeLists.txt', 'cmake/CPM.cmake') }}
          restore-keys: |
            cpm-${{ runner.os }}-msvc-
            cpm-${{ runner.os }}-

      - name: Configure
        run: >
          cmake -S . -B build
          -G "Visual Studio 17 2022"
          -A x64
          -DBUILD_SHARED_LIBS=OFF
          -DCPM_SOURCE_CACHE="${{ env.CPM_SOURCE_CACHE }}"

      - name: Build
        run: >
          cmake --build build
          --config RelWithDebInfo
          --parallel

      - name: Test
        run: >
          ctest --test-dir build
          -C RelWithDebInfo
          --output-on-failure
          --output-junit ctest-results.xml

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v6
        with:
          name: test-results-windows-msvc
          path: build/ctest-results.xml
          if-no-files-found: error